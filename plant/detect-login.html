<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenify - Disease Detection Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="detect">
  <div class="login-container">
    <div class="back-link">
      <a href="landing.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
    <div class="logo-icon">
      <i class="fas fa-microscope"></i>
    </div>
    <h2>Disease Detection Module</h2>
    <p class="subtitle">Login to access AI plant disease analyzer</p>
    
    <form action="detect-dashboard.html">
      <div class="input-group">
        <label>Email / Username</label>
        <input type="text" placeholder="Enter your email" value="demo@greenify.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password" value="123456">
      </div>
      <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>
    <p class="demo-note">Demo: Click login to continue</p>
  </div>
</body>
</html>
